<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470" viewBox="0 0 820 470" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A8C2E"/>
    </marker>
    <style>
      .card{fill:#0B110B;stroke:#334D33;stroke-width:1.5;rx:8}
      .gw{fill:#0d160d;stroke:#7DFF3B;stroke-width:2}
      .hex{fill:#0f1c0d;stroke:#4A8C2E;stroke-width:2}
      .t{fill:#B8EB9E;font-size:15px}
      .lbl{fill:#7DFF3B;font-size:16px;font-weight:700}
      .sub{fill:#597A59;font-size:12px}
      .amber{fill:#C4A359;font-size:12px}
      .edge{stroke:#4A8C2E;stroke-width:1.5;fill:none}
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="470" rx="12" fill="#0A0E0A"/>

  <!-- client -->
  <rect class="card" x="268" y="30" width="284" height="58" rx="8"/>
  <text class="t" x="410" y="55" text-anchor="middle">any OpenAI-compatible client</text>
  <text class="sub" x="410" y="74" text-anchor="middle">Cursor · curl · your app · iPad</text>

  <path class="edge" d="M410,88 L410,150" marker-end="url(#arrow)"/>

  <!-- gateway -->
  <rect class="gw" x="150" y="152" width="520" height="74" rx="10" filter="url(#glow)"/>
  <text class="lbl" x="410" y="182" text-anchor="middle">hub :4000  —  the gateway</text>
  <text class="sub" x="410" y="204" text-anchor="middle">one endpoint · stdlib Python · cost-aware routing + failover</text>

  <!-- fan-out edges -->
  <path class="edge" d="M300,226 C280,270 190,280 165,318" marker-end="url(#arrow)"/>
  <path class="edge" d="M410,226 L410,318" marker-end="url(#arrow)"/>
  <path class="edge" d="M520,226 C540,270 630,280 655,318" marker-end="url(#arrow)"/>

  <!-- backend hexes -->
  <g filter="url(#glow)">
    <polygon class="hex" points="165,320 217,350 217,410 165,440 113,410 113,350"/>
    <polygon class="hex" points="410,320 462,350 462,410 410,440 358,410 358,350"/>
    <polygon class="hex" points="655,320 707,350 707,410 655,440 603,410 603,350"/>
  </g>
  <text class="lbl" x="165" y="383" text-anchor="middle" font-size="14">vLLM</text>
  <text class="sub" x="165" y="401" text-anchor="middle">GPU box A</text>
  <text class="lbl" x="410" y="383" text-anchor="middle" font-size="14">vLLM</text>
  <text class="sub" x="410" y="401" text-anchor="middle">GPU box B</text>
  <text class="lbl" x="655" y="379" text-anchor="middle" font-size="13">LM Studio</text>
  <text class="sub" x="655" y="396" text-anchor="middle" font-size="11">on the hub</text>
  <text class="sub" x="655" y="409" text-anchor="middle" font-size="11">+ LM Link</text>
</svg>
