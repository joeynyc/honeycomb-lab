<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <filter id="g2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A8C2E"/>
    </marker>
    <marker id="a2r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C4A359"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="360" rx="12" fill="#0A0E0A"/>

  <text x="430" y="45" text-anchor="middle" fill="#B8EB9E" font-size="15" font-weight="700">Cost-aware routing</text>
  <text x="430" y="66" text-anchor="middle" fill="#597A59" font-size="12">the least expensive box that can actually serve the request</text>

  <!-- request pill -->
  <rect x="34" y="150" width="140" height="60" rx="30" fill="#0d160d" stroke="#7DFF3B" stroke-width="2" filter="url(#g2)"/>
  <text x="104" y="176" text-anchor="middle" fill="#7DFF3B" font-size="16" font-weight="700">"cheap"</text>
  <text x="104" y="196" text-anchor="middle" fill="#597A59" font-size="12">or "any"</text>

  <path d="M174,180 L214,180" stroke="#4A8C2E" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

  <!-- backend chain: cheapest first -->
  <g>
    <rect x="220" y="150" width="180" height="60" rx="8" fill="#0f1c0d" stroke="#4A8C2E" stroke-width="2"/>
    <text x="310" y="176" text-anchor="middle" fill="#B8EB9E" font-size="14">hub · LM Studio</text>
    <text x="310" y="195" text-anchor="middle" fill="#597A59" font-size="11">cheapest · small model</text>

    <path d="M400,180 L432,180" stroke="#4A8C2E" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

    <rect x="438" y="150" width="170" height="60" rx="8" fill="#0f1c0d" stroke="#4A8C2E" stroke-width="2"/>
    <text x="523" y="176" text-anchor="middle" fill="#B8EB9E" font-size="14">Spark A · vLLM</text>
    <text x="523" y="195" text-anchor="middle" fill="#597A59" font-size="11">next in cheap_order</text>

    <path d="M608,180 L640,180" stroke="#4A8C2E" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

    <rect x="646" y="150" width="170" height="60" rx="8" fill="#0f1c0d" stroke="#4A8C2E" stroke-width="2"/>
    <text x="731" y="176" text-anchor="middle" fill="#B8EB9E" font-size="14">Spark B · vLLM</text>
    <text x="731" y="195" text-anchor="middle" fill="#597A59" font-size="11">last resort</text>
  </g>

  <!-- picks label -->
  <text x="310" y="112" text-anchor="middle" fill="#7DFF3B" font-size="13">✓ first healthy backend</text>
  <text x="310" y="128" text-anchor="middle" fill="#7DFF3B" font-size="13">with a chat model loaded</text>
  <path d="M310,132 L310,148" stroke="#7DFF3B" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

  <!-- failover arcs (any) -->
  <path d="M310,210 C310,278 523,278 523,214" stroke="#C4A359" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#a2r)"/>
  <path d="M523,210 C523,300 731,300 731,214" stroke="#C4A359" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#a2r)"/>
  <text x="430" y="330" text-anchor="middle" fill="#C4A359" font-size="12">"any" — on error, fail over to the next backend</text>
</svg>
